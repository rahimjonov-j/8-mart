<!doctype html>
<html lang="uz">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>8-Mart  Tabrik</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap"
      rel="stylesheet"
    />

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Poppins", sans-serif;
      }

      body {
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #ff7eb3, #ff758c, #ff9a9e);
        overflow: hidden;
      }

      /* CARD */

      .card {
        width: 100%;
        max-width: 300px;
        background: rgba(255, 255, 255, 0.95);
        padding: 28px;
        border-radius: 22px;
        text-align: center;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.25);
        z-index: 2;
      }

      .title {
        font-size: 22px;
        font-weight: 700;
        background: linear-gradient(90deg, #ff2f92, #ff6a88);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        margin-bottom: 8px;
      }

      .subtitle {
        font-size: 13px;
        color: #666;
        margin-bottom: 18px;
      }

      input {
        width: 100%;
        padding: 11px;
        border-radius: 12px;
        border: 1px solid #eee;
        margin-bottom: 14px;
        font-size: 14px;
        outline: none;
      }

      button {
        width: 100%;
        padding: 11px;
        border: none;
        border-radius: 12px;
        background: linear-gradient(90deg, #ff2f92, #ff6a88);
        color: white;
        font-size: 14px;
        cursor: pointer;
        margin-top: 5px;
      }

      button:hover {
        transform: scale(1.03);
      }

      .result {
        margin-top: 18px;
        font-size: 14px;
        color: #444;
        min-height: 60px;
      }

      /* GIFT BOX */

      .gift {
        font-size: 45px;
        cursor: pointer;
        margin-bottom: 10px;
        animation: bounce 2s infinite;
      }

      @keyframes bounce {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-8px);
        }
      }

      /* FLOWERS */

      .flower {
        position: absolute;
        top: -20px;
        font-size: 18px;
        animation: fall linear infinite;
        opacity: 0.8;
      }

      @keyframes fall {
        0% {
          transform: translateY(-20px) rotate(0);
        }
        100% {
          transform: translateY(110vh) rotate(360deg);
        }
      }

      .share {
        margin-top: 10px;
        font-size: 13px;
        color: #ff2f92;
        cursor: pointer;
      }

      @media (max-width: 300px) {
        .card {
          padding: 22px;
        }

        .title {
          font-size: 19px;
        }
      }
    </style>
  </head>

  <body>
    <div class="card">
      <div class="gift" onclick="generate()">🎁</div>

      <div class="title">8-Mart Bayramingiz bilan</div>
      <div class="subtitle">Sovg‘ani oching va tabrik oling</div>

      <input id="name" placeholder="Ismingiz..." />

      <button onclick="generate()">Tabrik yaratish</button>

      <div class="result" id="result"></div>

      <div class="share" onclick="shareTelegram()">Telegramda ulash</div>
    </div>

    <audio id="music" loop>
      <source
        src="https://cdn.pixabay.com/audio/2022/03/15/audio_2c8cce7c74.mp3"
      />
    </audio>

    <script>

      const messages=[

      "8-mart muborak! Siz dunyoni yanada chiroyli qiladigan ajoyib insonsiz 🌸",
      "Bugun sizning bayramingiz! Hayotingiz quvonchga to‘lsin ✨",
      "Siz kabi mehribon insonlar juda kam uchraydi 🌷",
      "Har bir kuningiz baxt va kulguga to‘lsin 💐",
      "Siz atrofingizdagilarni ilhomlantiradigan insonsiz 🌹",
      "Siz bor joyda quvonch ham bo‘ladi 💖",
      "Doimo kulib yuring, sizga kulish juda yarashadi 🌺",
      "Hayotingiz gullardek chiroyli bo‘lsin 🌸"

      ]

      function generate(){

      const name=document.getElementById("name").value.trim()
      const result=document.getElementById("result")
      const music=document.getElementById("music")

      if(name===""){
      result.innerText="Iltimos ism kiriting 🙂"
      return
      }

      music.play()

      const msg=messages[Math.floor(Math.random()*messages.length)]
      const text=name+", "+msg

      typeEffect(text)

      }

      function typeEffect(text){

      const result=document.getElementById("result")
      result.innerHTML=""

      let i=0

      const timer=setInterval(()=>{

      result.innerHTML+=text.charAt(i)
      i++

      if(i>=text.length){
      clearInterval(timer)
      }

      },30)

      }

      /* FLOWERS */

      function createFlower(){

      const flower=document.createElement("div")
      flower.classList.add("flower")
      flower.innerHTML="🌸"

      flower.style.left=Math.random()*100+"vw"
      flower.style.animationDuration=(Math.random()*3+4)+"s"

      document.body.appendChild(flower)

      setTimeout(()=>{
      flower.remove()
      },7000)

      }

      setInterval(createFlower,600)

      /* TELEGRAM SHARE */
function shareTelegram(){

const text=document.getElementById("result").innerText

if(text===""){
alert("Avval tabrik yarating 🙂")
return
}

const site="https://javohirweb-mart-tabrik.netlify.app/"

const message =
text + "\n\n🎁 Siz ham tabrik yarating:\n" + site

const url =
"https://t.me/share/url?url=" +
encodeURIComponent(site) +
"&text=" +
encodeURIComponent(message)

window.open(url,"_blank")

}
    </script>
  </body>
</html>
